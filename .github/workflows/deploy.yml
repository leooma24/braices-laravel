name: Deploy to FTP

# Trigger SOLO manual.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, gd, zip, bcmath
          coverage: none

      - name: Stub .env mínimo para el build
        run: |
          cat > .env <<'EOF'
          APP_NAME=BienesCorp
          APP_ENV=production
          APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG=false
          APP_URL=https://bienescorp.com
          LOG_CHANNEL=stack
          DB_CONNECTION=mysql
          CACHE_DRIVER=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          EOF

      - name: Cache de Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies (sin dev, optimizado)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Validar que la app compila
        run: |
          php artisan config:clear
          php artisan view:clear
          php artisan --version

      - name: Limpiar archivos que NO van al zip
        run: |
          rm -f .env
          rm -rf .git .github tests .playwright-mcp
          rm -f phpunit.xml .editorconfig .env.example
          rm -rf node_modules
          # storage/logs/* etc se quedan; los excluimos en el zip

      - name: Crear deploy.zip
        # Un solo archivo en vez de 10,215 archivos uno por uno.
        # Excluye contenidos volátiles (storage cache/logs/sessions,
        # public/images/, public/photo-user/) que deben permanecer
        # intactos en el servidor.
        run: |
          zip -rq deploy.zip . \
            -x "storage/app/*" \
            -x "storage/framework/cache/data/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*" \
            -x "storage/logs/*" \
            -x "public/images/*" \
            -x "public/photo-user/*" \
            -x "bootstrap/cache/*.php"
          ls -lh deploy.zip
          echo "Files in zip: $(unzip -l deploy.zip | tail -1)"

      - name: Modo mantenimiento ON (antes de tocar prod)
        # Best-effort: intenta poner mantenimiento si el endpoint ya existe
        # (en deploys posteriores al primero). En el primer deploy, /deploy/run
        # no existe en prod aún → 404 → warning, continuamos.
        env:
          APP_DEPLOY_URL: ${{ secrets.APP_DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$APP_DEPLOY_URL" ] || [ -z "$DEPLOY_TOKEN" ]; then
            echo "::warning::Secrets faltan — saltando mantenimiento ON."
            exit 0
          fi
          code=$(curl -s -o /tmp/out -w "%{http_code}" \
            "${APP_DEPLOY_URL}/deploy/run?token=${DEPLOY_TOKEN}&action=down" || echo "000")
          echo "down: HTTP ${code}"
          cat /tmp/out 2>/dev/null || true

      - name: Subir deploy.zip + _first_deploy.php vía FTP
        # Curl directo: UN archivo grande, no 10K archivos. Esto sí pasa
        # el firewall (probado manualmente desde el sandbox).
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          set -e

          # Limpiar TODO whitespace (CR, LF, tabs, espacios) que pueda venir
          # en los secrets — un \r o \n al final del valor convierte el URL
          # en "ftp://host\n/path/file" que curl rechaza con error 3.
          clean() { printf '%s' "$1" | tr -d '[:space:]'; }
          HOST=$(clean "$FTP_HOST")
          USER=$(clean "$FTP_USERNAME")
          PASS=$(clean "$FTP_PASSWORD")
          DIR=$(clean "$FTP_REMOTE_DIR")
          DIR="${DIR%/}"      # quitar slash final si existe
          DIR="/${DIR#/}"     # asegurar que empieza con un solo slash

          # Diagnóstico sin filtrar credenciales (longitudes y first char).
          echo "HOST len=${#HOST} first=${HOST:0:1}"
          echo "DIR='${DIR}' (sin secretos en este valor)"
          echo "USER len=${#USER}"
          echo "PASS len=${#PASS}"

          if [ -z "$HOST" ] || [ -z "$USER" ] || [ -z "$PASS" ] || [ -z "$DIR" ]; then
            echo "::error::Algún secret está vacío después de limpiar whitespace."
            exit 1
          fi

          # _first_deploy.php va a /public_html/public/ (DocumentRoot real)
          # para ser ejecutable vía HTTP. El zip va a /public_html/ (un nivel
          # arriba, fuera del web root — no se puede descargar vía HTTP).
          echo "→ Subiendo _first_deploy.php al public/ (web root)"
          curl -sS --fail --connect-timeout 30 --max-time 60 \
            -u "${USER}:${PASS}" \
            -T public/_first_deploy.php \
            "ftp://${HOST}${DIR}/public/_first_deploy.php"

          echo "→ Subiendo deploy.zip ($(stat -c%s deploy.zip 2>/dev/null || wc -c < deploy.zip) bytes) al /public_html/"
          curl -sS --fail --connect-timeout 30 --max-time 600 \
            -u "${USER}:${PASS}" \
            -T deploy.zip \
            "ftp://${HOST}${DIR}/_deploy.zip"

          echo "→ Verificando que llegaron"
          curl -sS --connect-timeout 15 -u "${USER}:${PASS}" \
            "ftp://${HOST}${DIR}/" --list-only | grep -E "_deploy.zip" || \
            (echo "::error::deploy.zip no aparece en ${DIR}"; exit 1)
          curl -sS --connect-timeout 15 -u "${USER}:${PASS}" \
            "ftp://${HOST}${DIR}/public/" --list-only | grep -E "_first_deploy.php" || \
            (echo "::error::_first_deploy.php no aparece en ${DIR}/public"; exit 1)

      - name: Ejecutar extractor PHP vía HTTP
        env:
          APP_DEPLOY_URL: ${{ secrets.APP_DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          echo "→ Llamando _first_deploy.php para extraer"
          code=$(curl -sS -o /tmp/out -w "%{http_code}" --max-time 300 \
            "${APP_DEPLOY_URL}/_first_deploy.php?token=${DEPLOY_TOKEN}" || echo "000")
          echo "HTTP ${code}"
          cat /tmp/out
          if [ "$code" != "200" ]; then
            echo "::error::Extracción falló (HTTP ${code})"
            exit 1
          fi

      - name: Limpiar manifest cache de Laravel
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          clean() { printf '%s' "$1" | tr -d '[:space:]'; }
          HOST=$(clean "$FTP_HOST"); USER=$(clean "$FTP_USERNAME"); PASS=$(clean "$FTP_PASSWORD")
          DIR=$(clean "$FTP_REMOTE_DIR"); DIR="${DIR%/}"; DIR="/${DIR#/}"
          for f in services.php packages.php config.php routes-v7.php; do
            curl --silent --connect-timeout 10 \
              -u "${USER}:${PASS}" \
              -Q "-DELE ${DIR}/bootstrap/cache/${f}" \
              "ftp://${HOST}/" > /dev/null 2>&1 || true
          done
          echo "Manifest cache limpiado."

      - name: Disparar migrate + cache vía /deploy/run
        env:
          APP_DEPLOY_URL: ${{ secrets.APP_DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -e
          if [ -z "$APP_DEPLOY_URL" ] || [ -z "$DEPLOY_TOKEN" ]; then
            echo "::warning::Secrets faltan — saltando migrate/cache."
            exit 0
          fi

          probe() {
            curl -sS -o /tmp/out -w "%{http_code}" --max-time 60 \
              "${APP_DEPLOY_URL}/deploy/run?token=${DEPLOY_TOKEN}&action=$1" || echo "000"
          }

          echo "→ status"
          status_code=$(probe status)
          echo "HTTP ${status_code}"
          cat /tmp/out

          if [ "$status_code" != "200" ]; then
            echo "::error::status devolvió ${status_code}"
            exit 1
          fi

          echo ""
          echo "→ migrate"
          c=$(probe migrate); echo "HTTP ${c}"; cat /tmp/out
          [ "$c" = "200" ] || { echo "::error::migrate ${c}"; exit 1; }

          echo ""
          echo "→ cache"
          c=$(probe cache); echo "HTTP ${c}"; cat /tmp/out
          [ "$c" = "200" ] || { echo "::error::cache ${c}"; exit 1; }

          echo ""
          echo "Deploy completado."

      - name: Modo mantenimiento OFF (siempre)
        if: always()
        env:
          APP_DEPLOY_URL: ${{ secrets.APP_DEPLOY_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$APP_DEPLOY_URL" ] || [ -z "$DEPLOY_TOKEN" ]; then
            exit 0
          fi
          code=$(curl -s -o /tmp/out -w "%{http_code}" --max-time 30 \
            "${APP_DEPLOY_URL}/deploy/run?token=${DEPLOY_TOKEN}&action=up" || echo "000")
          echo "up: HTTP ${code}"
          cat /tmp/out 2>/dev/null || true
